name: Build All Platforms

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  windows-x64:
    name: Windows Build (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Directories
        run: |
          mkdir dist
          mkdir packages

      # ----------------------
      # Cache CUDA SDK
      - name: Cache CUDA SDK
        uses: actions/cache@v3
        id: cuda-cache
        with:
          path: C:\ProgramData\chocolatey\lib\cuda
          key: windows-cuda-12-2

      - name: Install CUDA SDK (if not cached)
        if: steps.cuda-cache.outputs.cache-hit != 'true'
        run: |
          choco install cuda -y
          refreshenv

      - name: Prepare AI models
        shell: cmd
        run: |
          set "KOKORO_CACHE=%USERPROFILE%\.cache\k"
          mkdir "%KOKORO_CACHE%"
          curl -L https://github.com/DavidValin/kokoro-tiny/raw/main/models/0.bin -o "%KOKORO_CACHE%\0.bin"
          curl -L https://github.com/DavidValin/kokoro-tiny/raw/main/models/0.onnx -o "%KOKORO_CACHE%\0.onnx"

      # ----------------------
      # Build Variants
      - name: Build Windows CPU
        shell: cmd
        run: |
          REM Load MSVC environment
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          REM Run PowerShell build script in a proper PowerShell process
          powershell -NoProfile -ExecutionPolicy Bypass -File "%CD%\build_windows.ps1" cpu openblas

      - name: Build Windows Vulkan
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          powershell -NoProfile -ExecutionPolicy Bypass -File "%CD%\build_windows.ps1" vulkan openblas

      - name: Build Windows CUDA
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          powershell -NoProfile -ExecutionPolicy Bypass -File "%CD%\build_windows.ps1" cuda openblas
      # ----------------------
      # Upload artifacts
      - name: Upload CPU Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cpu
          path: target-cross\cpu

      - name: Upload Vulkan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-vulkan
          path: target-cross\vulkan

      - name: Upload CUDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-cuda
          path: target-cross\cuda
