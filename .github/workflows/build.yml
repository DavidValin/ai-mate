name: Build All Platforms

# ----------------------
# Trigger
# ----------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ----------------------
# Linux Builds
# ----------------------
jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------
      # Setup QEMU for cross-arch Docker builds
      # ----------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # ----------------------
      # Cache K and Whisper Models
      # ----------------------
      - name: Cache K and Whisper Models
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/k
            ~/.whisper-models
          key: ${{ runner.os }}-k-whisper-${{ hashFiles('**/build_linux.sh') }}

      - name: Make Linux Build Script Executable
        run: chmod +x ./build_linux.sh

      # ----------------------
      # Build Linux
      # ----------------------
      - name: Build Linux (${{ matrix.arch }})
        run: ./build_linux.sh ${{ matrix.arch }}

      - name: Upload Linux Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/

# ----------------------
# macOS Builds
# ----------------------
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Sequoia
        uses: sormy/sequoia-action@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Make macOS Build Script Executable
        run: chmod +x ./build_macos.sh

      - name: Build macOS (${{ matrix.arch }})
        run: ./build_macos.sh ${{ matrix.arch }}

      - name: Upload macOS Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/

# ----------------------
# Windows Builds
# ----------------------
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Windows Output Folders
        shell: pwsh
        run: |
          if (-not (Test-Path -Path dist)) { New-Item -ItemType Directory -Path dist }
          if (-not (Test-Path -Path packages)) { New-Item -ItemType Directory -Path packages }

      - name: Build Windows (${{ matrix.arch }})
        shell: pwsh
        run: .\build_windows.ps1 ${{ matrix.arch }}

      - name: Upload Windows Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/
