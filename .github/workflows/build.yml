name: Build All Platforms

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      BIN_NAME: ai-mate
      DO_PACKAGE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare Artifacts Dir
        run: mkdir -p dist packages

      - name: Build Linux
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh --arch ${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-binaries
          path: dist/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      BIN_NAME: ai-mate
      DO_PACKAGE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare Artifacts Dir
        run: mkdir -p dist packages

      - name: Build macOS
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-binaries
          path: dist/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      BIN_NAME: ai-mate
      DO_PACKAGE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            C:\Users\runneradmin\.cargo\registry
            C:\Users\runneradmin\.cargo\git
          key: cargo-windows-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare Artifacts Dir
        run: mkdir dist packages

      - name: Build Windows
        run: |
          powershell ./build_windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-binaries
          path: dist/*
