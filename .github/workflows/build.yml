name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  setup-rust:
    runs-on: ubuntu-latest
    outputs:
      rust-cache-key: ${{ steps.cache-crates.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v3

      # Rust toolchain setup
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Cache Rust crates
      - name: Cache Rust crates
        id: cache-crates
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-crates-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

  build-linux-amd64:
    needs: setup-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        with:
          path: ~/.cache/k
          key: k-cache-${{ runner.os }}-amd64
      - uses: actions/cache@v3
        with:
          path: ~/.whisper-models
          key: whisper-models-${{ runner.os }}-amd64
      - name: Build Linux amd64
        run: |
          chmod +x ./build_linux.sh
          ./build_linux.sh --arch amd64

      - name: Upload Linux amd64 artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-amd64
          path: dist/

  build-linux-arm64:
    needs: setup-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: rust-crates-${{ runner.os }}-arm64-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust target for ARM64
        run: rustup target add aarch64-unknown-linux-gnu
      - name: Build Linux ARM64
        run: |
          mkdir -p target-cross/linux-arm64-cpu/release
          cargo build --release --target aarch64-unknown-linux-gnu --no-default-features --features whisper-logs
          cp target/aarch64-unknown-linux-gnu/release/ai-mate dist/ai-mate-0.3.0-linux-arm64
      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-arm64
          path: dist/

  build-windows:
    needs: setup-rust
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build Windows target
        run: |
          cargo build --release --target ${{ matrix.target }} --no-default-features --features whisper-logs
          copy target\${{ matrix.target }}\release\ai-mate.exe dist\ai-mate-0.3.0-${{ matrix.target }}.exe
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-${{ matrix.target }}
          path: dist/
